<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamlit App Embed Demo</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        .streamlit-embed {
            width: 100%;
            height: 100%;
            border: none; /* 移除 iframe 的預設邊框 */
        }
    </style>
</head>
<body>

    <iframe
        src="https://uibp-poster-demo.streamlit.app/"
        class="streamlit-embed"
        title="PCC LLM - Persona-Context Conflict Demo"
    >
        您的瀏覽器不支援 iframe，請
        <a href="https://uibp-poster-demo.streamlit.app/" target="_blank" rel="noopener noreferrer">
            直接點此連結
        </a>
        造訪應用程式。
    </iframe>

</body>
</html>
